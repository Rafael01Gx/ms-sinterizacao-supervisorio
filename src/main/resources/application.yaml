spring:
  application:
    name: supervisorio
    profiles:
      active: ${SPRING_PROFILES_ACTIVE:dev}
  lifecycle:
    timeout-per-shutdown-phase: 30s

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/supervisorio
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      connection-timeout: 30000
      maximum-pool-size: 30
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        generate_statistics: true
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 100
  redis:
    lettuce:
      pool:
        enabled: true

  # Jackson — serializa Instant como ISO-8601, não como timestamp numérico
  jackson:
    default-property-inclusion: non_null
    time-zone: America/Sao_Paulo

  # WebSocket — aumenta limites para mensagens grandes (snapshots completos)
  websocket:
    message-size-limit: 524288        # 512 KB
    send-buffer-size-limit: 1048576   # 1 MB
    send-time-limit: 10000            # 10s

server:
  port: 8080
  compression:
    enabled: true
  shutdown: graceful
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:92482029}
    key-store-type: PKCS12

plc:
  address: 127.0.0.1
  port: 44818
  slot: 0
  backplane: 1
  timeout: 3000
  polling:
    process-interval-ms: 250
    alarm-interval-ms: 250
  connection-string: logix://${plc.address}:${plc.port}?backplane=${plc.backplane}&slot=${plc.slot}&force-unconnected-operation=true

logging:
  level:
    root: INFO
    org.apache.plc4x: WARN
    org.springframework.web.socket: INFO
    org.springframework.messaging: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized
