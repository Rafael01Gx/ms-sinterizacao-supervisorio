spring:
  application:
    name: supervisorio
    profile:
      active: ${SPRING_PROFILES_ACTIVE:dev}
  lifecycle:
    timeout-per-shutdown-phase: 30s

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5432/supervisorio
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      connection-timeout: 30000
      maximum-pool-size: 30
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public
        generate_statistics: true
        session:
          events:
            log:
              LOG_QUERIES_SLOWER_THAN_MS: 100
  redis:
    lettuce:
      pool:
        enabled: true

server:
  port: 8080
  compression:
    enabled: true
  shutdown: graceful
  ssl:
    enabled: true
    key-store: classpath:keystore.p12
    key-store-password: ${SSL_KEYSTORE_PASSWORD:92482029}
    key-store-type: PKCS12

plc:
  address: 128.1.200.50
  polling:
    process-interval-ms: 500
    alarm-interval-ms: 250